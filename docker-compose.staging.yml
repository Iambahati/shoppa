services:

  app:
    image: shoppa-app:staging
    build:
      context: .
      dockerfile: Dockerfile
    env_file: .env.staging
    volumes:
      - staging_storage:/var/www/html/storage

  nginx:
    ports:
      - "8080:80"
    volumes:
      - ./docker/nginx/staging.conf:/etc/nginx/conf.d/default.conf:ro
      - staging_storage:/var/www/html/storage:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro

  postgres:
    env_file: .env.staging
    volumes:
      - staging_postgres:/var/lib/postgresql/data

  queue:
    image: shoppa-app:staging
    env_file: .env.staging
    volumes:
      - staging_storage:/var/www/html/storage

  scheduler:
    image: shoppa-app:staging
    env_file: .env.staging
    volumes:
      - staging_storage:/var/www/html/storage

volumes:
  staging_postgres:
    name: shoppa_staging_postgres
  staging_storage:
    name: shoppa_staging_storage
