server {
    listen 80;
    server_name dev.shoppa.co.ke;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name dev.shoppa.co.ke;

    ssl_certificate     /etc/letsencrypt/live/dev.shoppa.co.ke/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/dev.shoppa.co.ke/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    root /var/www/html/public;
    index index.php;

    access_log /var/log/nginx/shoppa-staging.access.log;
    error_log  /var/log/nginx/shoppa-staging.error.log;

    client_max_body_size 50M;

    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    location ~ \.php$ {
        fastcgi_pass app:9000;
        fastcgi_index index.php;
        fastcgi_param SCRIPT_FILENAME $realpath_root$fastcgi_script_name;
        include fastcgi_params;
        fastcgi_read_timeout 300;
    }

    location ~ /\.(?!well-known).* {
        deny all;
    }
}
