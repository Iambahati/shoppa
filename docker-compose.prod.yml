services:

  app:
    image: shoppa-app:${APP_VERSION:-latest}
    build:
      context: .
      dockerfile: Dockerfile
    env_file: .env.prod
    volumes:
      - prod_storage:/var/www/html/storage

  nginx:
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./docker/nginx/prod.conf:/etc/nginx/conf.d/default.conf:ro
      - prod_storage:/var/www/html/storage:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro

  postgres:
    env_file: .env.prod
    volumes:
      - prod_postgres:/var/lib/postgresql/data

  queue:
    image: shoppa-app:${APP_VERSION:-latest}
    env_file: .env.prod
    volumes:
      - prod_storage:/var/www/html/storage

  scheduler:
    image: shoppa-app:${APP_VERSION:-latest}
    env_file: .env.prod
    volumes:
      - prod_storage:/var/www/html/storage

volumes:
  prod_postgres:
    name: shoppa_prod_postgres
  prod_storage:
    name: shoppa_prod_storage
