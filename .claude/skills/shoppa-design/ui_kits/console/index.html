<!-- @startingPoint section="Console" subtitle="Authenticated app shell with role-aware sidebar + dashboards" viewport="1180x760" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Shoppa — Console</title>
<link rel="stylesheet" href="../../styles.css" />
<style>
  html, body { height: 100%; margin: 0; }
  body { background: var(--stone-100); font-family: var(--font-sans); }
  #root { min-height: 100%; }
</style>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="../../_ds_bundle.js"></script>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel" src="Shell.jsx"></script>
  <script type="text/babel" src="Dashboards.jsx"></script>
  <script type="text/babel">
    const TITLES = { buyer: 'Dashboard', vendor: 'Seller dashboard', admin: 'Dashboard' };
    function App() {
      const [role, setRole] = React.useState('buyer');
      const [active, setActive] = React.useState('dashboard');
      const switchRole = (r) => { setRole(r); setActive('dashboard'); };
      const title = active === 'users' ? 'Users'
        : active === 'listings' ? 'Listings'
        : active === 'orders' ? 'My orders'
        : active === 'browse' ? 'Browse'
        : TITLES[role];
      return (
        <Console role={role} setRole={switchRole} active={active} setActive={setActive} title={title}>
          {role === 'buyer' && <BuyerDashboard />}
          {role === 'vendor' && <VendorDashboard />}
          {role === 'admin' && <AdminDashboard active={active} />}
        </Console>
      );
    }
    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
