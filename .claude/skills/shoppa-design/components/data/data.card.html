<!-- @dsCard group="Components" viewport="700x380" name="Data display" subtitle="Badge · Avatar · StatCard" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../../styles.css" />
<style>
  body { margin: 0; font-family: var(--font-sans); background: var(--stone-100); padding: 24px; color: var(--stone-800); }
  h4 { margin: 0 0 12px; font-size: 11px; text-transform: uppercase; letter-spacing: var(--tracking-wider); color: var(--stone-400); }
  section { margin-bottom: 22px; }
  .row { display: flex; flex-wrap: wrap; align-items: center; gap: 12px; }
  .stats { display: grid; grid-template-columns: repeat(3, 1fr); gap: 14px; }
</style>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="../../_ds_bundle.js"></script>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel">
    const { Badge, Avatar, StatCard } = window.ShoppaDesignSystem_cbc994;
    function Demo() {
      return (
        <>
          <section>
            <h4>Badge</h4>
            <div className="row">
              <Badge color="emerald">Active</Badge>
              <Badge color="amber">Awaiting verification</Badge>
              <Badge color="blue">In review</Badge>
              <Badge color="red">Disputed</Badge>
              <Badge color="purple">Verifier</Badge>
              <Badge color="stone">Draft</Badge>
            </div>
          </section>
          <section>
            <h4>Avatar</h4>
            <div className="row">
              <Avatar name="Jane Wanjiru" size="lg" />
              <Avatar name="Otieno K" />
              <Avatar name="CM" tone="soft" />
              <Avatar name="Si" tone="soft" size="sm" />
            </div>
          </section>
          <section>
            <h4>StatCard</h4>
            <div className="stats">
              <StatCard label="Active orders" value="3" icon="box" iconColor="blue" />
              <StatCard label="Verified devices" value="128" icon="shield" iconColor="emerald" trend="+12%" trendDir="up" />
              <StatCard label="Balance (KSh)" value="84,200.00" icon="store" iconColor="purple" />
            </div>
          </section>
        </>
      );
    }
    ReactDOM.createRoot(document.getElementById('root')).render(<Demo />);
  </script>
</body>
</html>
