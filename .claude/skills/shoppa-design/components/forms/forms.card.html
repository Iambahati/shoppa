<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../../styles.css" />
<style>
  body { margin: 0; font-family: var(--font-sans); background: var(--white); padding: 24px; color: var(--stone-800); }
  h4 { margin: 0 0 12px; font-size: 11px; text-transform: uppercase; letter-spacing: var(--tracking-wider); color: var(--stone-400); }
  section { margin-bottom: 24px; }
  .row { display: flex; flex-wrap: wrap; align-items: center; gap: 12px; }
  .cols { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; max-width: 560px; }
</style>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="../../_ds_bundle.js"></script>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel">
    const { Button, Input, Checkbox, Icon } = window.ShoppaDesignSystem_cbc994;
    function Demo() {
      return (
        <>
          <section>
            <h4>Button · variants</h4>
            <div className="row">
              <Button variant="primary">Add listing</Button>
              <Button variant="secondary">Filter</Button>
              <Button variant="ghost">Clear</Button>
              <Button variant="danger">Reject device</Button>
            </div>
          </section>
          <section>
            <h4>Button · sizes, icon, loading, disabled</h4>
            <div className="row">
              <Button size="sm">Small</Button>
              <Button size="md" iconLeft={<Icon name="plus" size={16} />}>Medium</Button>
              <Button size="lg">Large</Button>
              <Button loading>Signing in…</Button>
              <Button disabled>Disabled</Button>
            </div>
          </section>
          <section>
            <h4>Input &amp; Checkbox</h4>
            <div className="cols">
              <Input label="Email address" name="d_email" type="email" placeholder="you@example.com" required />
              <Input label="Password" name="d_pw" type="password" error="Those credentials don't match." required />
            </div>
            <div className="row" style={{ marginTop: 14 }}>
              <Checkbox name="d_remember" label="Keep me signed in" defaultChecked />
            </div>
          </section>
        </>
      );
    }
    ReactDOM.createRoot(document.getElementById('root')).render(<Demo />);
  </script>
</body>
</html>
