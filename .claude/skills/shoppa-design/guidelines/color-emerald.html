<!-- @dsCard group="Colors" viewport="700x150" name="Primary · Emerald" subtitle="Trust green — the verified action color" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body { margin: 0; font-family: var(--font-sans); background: var(--white); padding: 20px; }
  .row { display: flex; gap: 0; border-radius: var(--radius-lg); overflow: hidden; box-shadow: inset 0 0 0 1px var(--ring-card); }
  .sw { flex: 1; height: 88px; display: flex; flex-direction: column; justify-content: flex-end; padding: 8px; box-sizing: border-box; }
  .sw span { font-size: 10px; font-weight: 600; line-height: 1.3; }
  .sw .hex { font-family: var(--font-mono); font-size: 9px; opacity: 0.8; }
  .lt { color: var(--stone-700); } .dk { color: rgba(255,255,255,0.95); }
  .cap { display:flex; gap:8px; align-items:center; margin: 0 0 12px; }
  .cap b { font-size: 13px; color: var(--stone-900); } .cap em { font-style: normal; font-size: 12px; color: var(--stone-500); }
</style>
</head>
<body>
  <div class="cap"><b>Emerald</b><em>600 = primary · 700 = hover/pressed · 50 = tinted surfaces</em></div>
  <div class="row">
    <div class="sw lt" style="background:var(--emerald-50)"><span>50</span><span class="hex">#ecfdf5</span></div>
    <div class="sw lt" style="background:var(--emerald-100)"><span>100</span><span class="hex">#d1fae5</span></div>
    <div class="sw lt" style="background:var(--emerald-200)"><span>200</span><span class="hex">#a7f3d0</span></div>
    <div class="sw lt" style="background:var(--emerald-400)"><span>400</span><span class="hex">#34d399</span></div>
    <div class="sw dk" style="background:var(--emerald-500)"><span>500</span><span class="hex">#10b981</span></div>
    <div class="sw dk" style="background:var(--emerald-600)"><span>600 ◆</span><span class="hex">#059669</span></div>
    <div class="sw dk" style="background:var(--emerald-700)"><span>700</span><span class="hex">#047857</span></div>
    <div class="sw dk" style="background:var(--emerald-900)"><span>900</span><span class="hex">#064e3b</span></div>
  </div>
</body>
</html>
