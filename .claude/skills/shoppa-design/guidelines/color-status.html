<!-- @dsCard group="Colors" viewport="700x170" name="Status families" subtitle="Verification & order states as soft chips" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body { margin: 0; font-family: var(--font-sans); background: var(--white); padding: 20px; color: var(--stone-700); }
  .wrap { display: flex; flex-wrap: wrap; gap: 10px; }
  .chip { display: inline-flex; align-items: center; gap: 6px; padding: 5px 12px; border-radius: var(--radius-full); font-size: var(--text-xs); font-weight: 600; }
  .dot { width: 7px; height: 7px; border-radius: 50%; }
  .lbl { margin: 0 0 12px; font-size: 12px; color: var(--stone-500); }
</style>
</head>
<body>
  <p class="lbl">Each family pairs a 50 surface, a 700 label and a 200 ring — applied across CertBadge, Badge and Alert.</p>
  <div class="wrap">
    <span class="chip" style="background:var(--status-verified-bg);color:var(--status-verified-fg);box-shadow:inset 0 0 0 1px var(--status-verified-ring)"><span class="dot" style="background:var(--emerald-600)"></span>Verified</span>
    <span class="chip" style="background:var(--status-info-bg);color:var(--status-info-fg);box-shadow:inset 0 0 0 1px var(--status-info-ring)"><span class="dot" style="background:var(--blue-600)"></span>In review</span>
    <span class="chip" style="background:var(--status-pending-bg);color:var(--status-pending-fg);box-shadow:inset 0 0 0 1px var(--status-pending-ring)"><span class="dot" style="background:var(--amber-600)"></span>Pending</span>
    <span class="chip" style="background:var(--status-rejected-bg);color:var(--status-rejected-fg);box-shadow:inset 0 0 0 1px var(--status-rejected-ring)"><span class="dot" style="background:var(--red-600)"></span>Rejected</span>
    <span class="chip" style="background:var(--status-staff-bg);color:var(--status-staff-fg);box-shadow:inset 0 0 0 1px var(--status-staff-ring)"><span class="dot" style="background:var(--purple-600)"></span>Staff</span>
    <span class="chip" style="background:var(--status-neutral-bg);color:var(--status-neutral-fg);box-shadow:inset 0 0 0 1px var(--status-neutral-ring)"><span class="dot" style="background:var(--stone-400)"></span>Neutral</span>
  </div>
</body>
</html>
