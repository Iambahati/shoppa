<!-- @dsCard group="Type" viewport="700x180" name="Typeface · Inter" subtitle="The UI workhorse — 400/500/600/700" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body { margin: 0; font-family: var(--font-sans); background: var(--white); padding: 24px; color: var(--stone-900); }
  .big { font-size: 56px; font-weight: 600; letter-spacing: var(--tracking-tight); line-height: 1; margin: 0; }
  .meta { margin: 6px 0 18px; font-size: 12px; color: var(--stone-500); }
  .weights { display: flex; gap: 28px; }
  .w b { display:block; font-size: 22px; }
  .w span { font-size: 11px; color: var(--stone-500); }
</style>
</head>
<body>
  <p class="big">Verified by Shoppa</p>
  <p class="meta">Inter · self-hosted in product (Bunny Fonts) · feels modern, neutral, friendly</p>
  <div class="weights">
    <div class="w"><b style="font-weight:400">Aa</b><span>Regular · 400 · body</span></div>
    <div class="w"><b style="font-weight:500">Aa</b><span>Medium · 500 · labels</span></div>
    <div class="w"><b style="font-weight:600">Aa</b><span>Semibold · 600 · headings</span></div>
    <div class="w"><b style="font-weight:700">Aa</b><span>Bold · 700 · emphasis</span></div>
  </div>
</body>
</html>
