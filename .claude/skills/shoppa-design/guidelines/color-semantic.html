<!-- @dsCard group="Colors" viewport="700x150" name="Semantic accents" subtitle="Status only — amber, red, blue, purple (staff)" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body { margin: 0; font-family: var(--font-sans); background: var(--white); padding: 20px; }
  .grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; }
  .acc { border-radius: var(--radius-lg); overflow: hidden; box-shadow: inset 0 0 0 1px var(--ring-card); }
  .chip { height: 56px; }
  .meta { padding: 8px 10px; }
  .meta b { display:block; font-size: 12px; color: var(--stone-900); }
  .meta span { font-size: 11px; color: var(--stone-500); }
</style>
</head>
<body>
  <div class="grid">
    <div class="acc"><div class="chip" style="background:var(--amber-600)"></div><div class="meta"><b>Amber</b><span>Pending / warning</span></div></div>
    <div class="acc"><div class="chip" style="background:var(--red-600)"></div><div class="meta"><b>Red</b><span>Error / danger</span></div></div>
    <div class="acc"><div class="chip" style="background:var(--blue-600)"></div><div class="meta"><b>Blue</b><span>Info / in&nbsp;review</span></div></div>
    <div class="acc"><div class="chip" style="background:var(--purple-600)"></div><div class="meta"><b>Purple</b><span>Staff roles</span></div></div>
  </div>
</body>
</html>
