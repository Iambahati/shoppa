<!-- @dsCard group="Brand" viewport="700x200" name="Wordmark & trust lock-up" subtitle="Shoppa is a word, not a logotype — always paired with the mark" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body { margin: 0; font-family: var(--font-sans); padding: 0; }
  .split { display: grid; grid-template-columns: 1fr 1fr; min-height: 200px; }
  .pane { display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 10px; }
  .light { background: var(--stone-50); }
  .dark { background: var(--stone-900); }
  .lock { display: inline-flex; align-items: center; gap: 8px; }
  .word { font-size: 30px; font-weight: 600; letter-spacing: var(--tracking-tight); }
  .word.l { color: var(--stone-900); } .word.d { color: var(--white); }
  .pill { display:inline-flex; align-items:center; gap:5px; padding:3px 9px; border-radius: var(--radius-full); font-size: 12px; font-weight: 600; }
  .pill.l { background: var(--emerald-50); color: var(--emerald-700); box-shadow: inset 0 0 0 1px rgba(5,150,105,.2); }
  .pill.d { background: rgba(16,185,129,.18); color: #6ee7b7; box-shadow: inset 0 0 0 1px rgba(16,185,129,.3); }
  .cap { font-size: 11px; }
  .cap.l { color: var(--stone-400); } .cap.d { color: var(--stone-400); }
</style>
</head>
<body>
  <div class="split">
    <div class="pane light">
      <div class="lock">
        <span class="word l">Shoppa</span>
        <span class="pill l">
          <svg width="13" height="13" viewBox="0 0 20 20" fill="currentColor"><path fill-rule="evenodd" d="M16.403 12.652a3 3 0 000-5.304 3 3 0 00-3.75-3.751 3 3 0 00-5.305 0 3 3 0 00-3.751 3.75 3 3 0 000 5.305 3 3 0 003.75 3.751 3 3 0 005.305 0 3 3 0 003.751-3.75zm-2.546-4.46a.75.75 0 00-1.214-.883l-3.483 4.79-1.88-1.88a.75.75 0 10-1.06 1.061l2.5 2.5a.75.75 0 001.137-.089l4-5.5z" clip-rule="evenodd"/></svg>
          verified
        </span>
      </div>
      <span class="cap l">On light · auth, marketing</span>
    </div>
    <div class="pane dark">
      <div class="lock">
        <span class="word d">Shoppa</span>
        <span class="pill d">verified</span>
      </div>
      <span class="cap d">On stone-900 · sidebar</span>
    </div>
  </div>
</body>
</html>
