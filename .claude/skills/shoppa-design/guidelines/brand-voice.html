<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body { margin: 0; font-family: var(--font-sans); background: var(--white); padding: 22px; color: var(--stone-800); }
  .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
  .col h4 { margin: 0 0 8px; font-size: 11px; text-transform: uppercase; letter-spacing: var(--tracking-wider); }
  .do h4 { color: var(--emerald-700); } .dont h4 { color: var(--stone-400); }
  .item { font-size: 13px; padding: 7px 12px; border-radius: var(--radius-lg); margin-bottom: 7px; line-height: 1.4; }
  .do .item { background: var(--emerald-50); color: var(--stone-800); }
  .dont .item { background: var(--stone-50); color: var(--stone-500); box-shadow: inset 0 0 0 1px var(--stone-200); }
  .dont .item { text-decoration: none; }
</style>
</head>
<body>
  <div class="grid">
    <div class="col do">
      <h4>✓ Say</h4>
      <div class="item">“Welcome back”</div>
      <div class="item">“Buy and sell verified electronics with confidence”</div>
      <div class="item">“Create one free”</div>
      <div class="item">“Every device is physically inspected before listing.”</div>
    </div>
    <div class="col dont">
      <h4>✗ Avoid</h4>
      <div class="item">“Authenticate your session”</div>
      <div class="item">“Leverage our marketplace solution”</div>
      <div class="item">“Sign up now!!”</div>
      <div class="item">“Our proprietary verification technology…”</div>
    </div>
  </div>
</body>
</html>
