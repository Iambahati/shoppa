<!-- @dsCard group="Type" viewport="700x230" name="Type scale" subtitle="Display → meta, the steps actually in use" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body { margin: 0; font-family: var(--font-sans); background: var(--white); padding: 24px; color: var(--stone-900); }
  .row { display: flex; align-items: baseline; gap: 16px; padding: 7px 0; border-bottom: 1px solid var(--stone-100); }
  .row:last-child { border-bottom: 0; }
  .tag { width: 130px; flex-shrink: 0; font-size: 11px; color: var(--stone-400); font-family: var(--font-mono); }
  .spec { font-size: 11px; color: var(--stone-400); margin-left: auto; font-family: var(--font-mono); }
</style>
</head>
<body>
  <div class="row"><span class="tag">stat / auth</span><span style="font:var(--type-stat)">Good morning, Jane</span><span class="spec">24 / 600</span></div>
  <div class="row"><span class="tag">page-heading</span><span style="font:var(--type-page-heading)">Inspection queue</span><span class="spec">20 / 600</span></div>
  <div class="row"><span class="tag">section</span><span style="font-size:18px;font-weight:600">Recent listings</span><span class="spec">18 / 600</span></div>
  <div class="row"><span class="tag">body</span><span style="font:var(--type-body)">Every device is physically inspected before listing.</span><span class="spec">14 / 400</span></div>
  <div class="row"><span class="tag">label</span><span style="font:var(--type-label)">Email address</span><span class="spec">14 / 500</span></div>
  <div class="row"><span class="tag">meta</span><span style="font:var(--type-meta);color:var(--stone-400)">Updated 2 hours ago</span><span class="spec">12 / 400</span></div>
</body>
</html>
